<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きょうのよていボード｜絵カード予定表</title>
<style>
:root{
  --bg:#f5f0e8;
  --paper:#fffef9;
  --ink:#202020;
  --muted:#7a746b;
  --line:#d7cfc2;
  --accent:#ffb84d;
  --accent2:#7cc7ff;
  --green:#8fe39b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:radial-gradient(circle at top,#fff8e8 0,var(--bg) 45%,#ece3d5 100%);
  color:var(--ink);
  font-family:"Hiragino Sans","Yu Gothic",Meiryo,system-ui,sans-serif;
}
header{
  padding:18px 24px 8px;
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:16px;
}
h1{margin:0;font-size:30px;letter-spacing:.03em}
.subtitle{color:var(--muted);font-weight:700;margin-top:4px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button{
  border:0;
  border-radius:14px;
  padding:10px 14px;
  background:#fff;
  box-shadow:0 3px 0 rgba(0,0,0,.12);
  font-weight:800;
  cursor:pointer;
  color:var(--ink);
}
button.blue{background:var(--accent2)}
button.orange{background:var(--accent)}
button.green{background:var(--green)}
button.danger{background:#ffd6d6}
button.active{outline:4px solid rgba(0,0,0,.18)}
main{padding:10px 18px 24px}
.mode-tabs{
  max-width:1480px;
  margin:0 auto 12px;
  display:flex;
  gap:10px;
}
.screen{display:none}
.screen.active{display:block}

/* schedule board */
.board{
  background:var(--paper);
  border:8px solid #c9b99e;
  border-radius:28px;
  padding:18px;
  box-shadow:0 14px 30px rgba(61,42,16,.18);
  max-width:1480px;
  margin:0 auto;
}
.row{
  display:grid;
  grid-template-columns:140px repeat(8,1fr);
  gap:10px;
  align-items:stretch;
  margin-bottom:14px;
}
.row:last-child{margin-bottom:0}
.row-label{
  min-height:170px;
  background:#fff7dc;
  border:3px solid #cfc6b7;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
  position:relative;
}
.row-label::after{
  content:"変更";
  position:absolute;
  right:7px;
  top:7px;
  background:#fff;
  border-radius:999px;
  padding:3px 7px;
  font-size:12px;
  font-weight:900;
  color:#6b6254;
}
.slot{
  min-height:170px;
  background:#fff;
  border:3px dashed #cfc6b7;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:.12s;
}
.slot:hover,.row-label:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}
.slot.empty::before{
  content:"＋";
  color:#b8ad9b;
  font-size:44px;
  font-weight:900;
}
.card{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:center;
  padding:4px;
  user-select:none;
}
.card img{
  width:100%;
  height:132px;
  object-fit:contain;
  display:block;
}
.card .label{
  font-size:22px;
  font-weight:900;
  text-align:center;
  line-height:1.1;
  margin-top:2px;
}
.row-label .card img{height:118px}
.row-label .card .label{font-size:21px}
.slot.done{opacity:.45;background:#eee}
.slot.done::after{
  content:"できた";
  position:absolute;
  top:8px;
  right:8px;
  background:#84d68b;
  color:#07350b;
  border-radius:999px;
  padding:4px 8px;
  font-weight:900;
  font-size:14px;
}
.slot.dragging{opacity:.35;outline:4px solid var(--accent)}
.slot.drag-over{background:#fff2cf;outline:4px solid var(--accent)}
.hint{
  max-width:1480px;
  margin:10px auto 0;
  color:var(--muted);
  font-weight:700;
  font-size:14px;
}

/* big card mode */
.big-wrap{
  max-width:1480px;
  margin:0 auto;
  background:var(--paper);
  border:8px solid #c9b99e;
  border-radius:28px;
  padding:18px;
  box-shadow:0 14px 30px rgba(61,42,16,.18);
  min-height:620px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.big-controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.big-title{
  font-size:28px;
  font-weight:900;
}
.big-stage{
  flex:1;
  display:grid;
  grid-template-columns:repeat(var(--big-count,1),1fr);
  gap:16px;
  min-height:460px;
}
.big-empty{
  border:4px dashed #cfc6b7;
  border-radius:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#b8ad9b;
  font-size:54px;
  font-weight:900;
  background:#fff;
  cursor:pointer;
}
.big-card{
  border:5px solid #202020;
  border-radius:30px;
  background:#fffdf8;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px;
  position:relative;
  cursor:pointer;
  min-height:0;
}
.big-card img{
  width:100%;
  height:calc(100% - 80px);
  min-height:260px;
  object-fit:contain;
}
.big-card .big-label{
  font-size:clamp(34px,4vw,72px);
  font-weight:900;
  text-align:center;
  line-height:1.05;
  margin-top:10px;
}
.big-card .remove-big{
  position:absolute;
  top:10px;
  right:10px;
  background:#ffd6d6;
  border-radius:999px;
  padding:8px 12px;
  font-size:15px;
  font-weight:900;
}
.big-card.one img{min-height:380px}
.big-card.one .big-label{font-size:clamp(48px,6vw,96px)}

/* dialog */
dialog{
  width:min(980px,94vw);
  border:0;
  border-radius:24px;
  padding:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
dialog::backdrop{background:rgba(0,0,0,.35)}
.dialog-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.dialog-head h2{margin:0;font-size:24px}
.picker{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(138px,1fr));
  gap:10px;
  max-height:62vh;
  overflow:auto;
  padding:4px;
}
.pick-card{
  border:3px solid #e2d9ca;
  border-radius:18px;
  background:#fffdf8;
  padding:8px;
  display:grid;
  place-items:center;
  gap:6px;
  cursor:pointer;
  min-height:150px;
}
.pick-card:hover{border-color:var(--accent);background:#fff6e3}
.pick-card img{width:112px;height:112px;object-fit:contain}
.pick-card span{font-size:18px;font-weight:900;text-align:center}
.dialog-actions{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:14px;
  flex-wrap:wrap;
}
.note{color:var(--muted);font-size:13px;font-weight:700}

@media(max-width:760px){
  header{align-items:flex-start;flex-direction:column}
  h1{font-size:24px}
  .row{grid-template-columns:95px repeat(8,120px);overflow-x:auto}
  .board{overflow-x:auto}
  .row-label,.slot{min-height:140px}
  .card img{height:100px}
  .big-wrap{min-height:calc(100vh - 150px);padding:12px}
  .big-stage{
    grid-template-columns:1fr;
    grid-template-rows:repeat(var(--big-count,1),1fr);
    min-height:calc(100vh - 260px);
  }
  .big-card img{height:auto;min-height:120px;max-height:38vh}
  .big-card.one img{min-height:260px}
  .big-card .big-label{font-size:38px}
  .big-card.one .big-label{font-size:54px}
}
</style>
</head>
<body>
<header>
  <div>
    <h1>きょうの よていボード</h1>
    <div class="subtitle" id="subtitle">左端の場面カードも変更できます。予定カードはドラッグで移動できます。</div>
  </div>
  <div class="toolbar">
    <button class="blue schedule-only" onclick="toggleDoneMode()">できたチェック: <span id="doneModeText">OFF</span></button>
    <button class="schedule-only" onclick="saveBoard()">保存</button>
    <button class="schedule-only" onclick="loadBoard()">読み込み</button>
    <button class="danger schedule-only" onclick="clearBoard()">ぜんぶ消す</button>
  </div>
</header>

<main>
  <div class="mode-tabs">
    <button id="scheduleTab" class="orange active" onclick="switchMode('schedule')">予定ボード</button>
    <button id="bigTab" class="green" onclick="switchMode('big')">大きく見せる</button>
  </div>

  <section id="scheduleScreen" class="screen active">
    <section class="board" id="board"></section>
    <p class="hint">
      使い方：左端の場面カード、または空き枠をクリックしてカードを選びます。予定カードはドラッグして別の枠へ移動・入れ替えできます。
    </p>
  </section>

  <section id="bigScreen" class="screen">
    <div class="big-wrap">
      <div class="big-controls">
        <div class="big-title">大きく見せるカード</div>
        <div class="toolbar">
          <button class="green" onclick="addBigCard()">カードを追加</button>
          <button class="danger" onclick="clearBigCards()">ぜんぶ消す</button>
        </div>
      </div>
      <div class="big-stage" id="bigStage"></div>
      <p class="hint">
        最大3枚まで選べます。1枚なら大きく、2枚・3枚なら画面を分けて表示します。スマートフォンでは縦に並びます。
      </p>
    </div>
  </section>
</main>

<dialog id="pickerDialog">
  <div class="dialog-head">
    <h2 id="pickerTitle">どの絵カードにしますか？</h2>
    <button onclick="closePicker()">閉じる</button>
  </div>
  <div class="picker" id="picker"></div>
  <div class="dialog-actions">
    <button class="danger" id="removeButton" onclick="removeCard()">この枠を空にする</button>
    <div class="note">画像一覧は cards/cards.json から読み込んでいます。</div>
  </div>
</dialog>

<script>
let cardMaster=[];

const rows=[
  {id:"row1",defaultLabelCardId:"asa"},
  {id:"row2",defaultLabelCardId:"ohiru"},
  {id:"row3",defaultLabelCardId:"yoru"}
];

const SLOT_COUNT=8;
let currentMode="schedule";
let boardData={};
let rowLabelData={};
let bigCards=[];
let selectedSlotKey=null;
let selectedRowId=null;
let selectedBigIndex=null;
let pickerMode="slot";
let doneMode=false;
let draggedSlotKey=null;

async function loadCardMaster(){
  try{
    const r=await fetch("cards/cards.json?ts="+Date.now());
    cardMaster=await r.json();
    cardMaster=cardMaster.map(c=>({
      ...c,
      image:c.image.startsWith("cards/")?c.image:"cards/"+c.image
    }));
  }catch(e){
    alert("cards/cards.json を読み込めませんでした。GitHub Pages上で開いてください。");
    console.error(e);
  }
}

function switchMode(mode){
  currentMode=mode;
  document.getElementById("scheduleScreen").classList.toggle("active",mode==="schedule");
  document.getElementById("bigScreen").classList.toggle("active",mode==="big");
  document.getElementById("scheduleTab").classList.toggle("active",mode==="schedule");
  document.getElementById("bigTab").classList.toggle("active",mode==="big");
  document.querySelectorAll(".schedule-only").forEach(el=>el.style.display=mode==="schedule"?"inline-block":"none");
  document.getElementById("subtitle").textContent=mode==="schedule"
    ?"左端の場面カードも変更できます。予定カードはドラッグで移動できます。"
    :"その場で伝えたいことを、絵カードで大きく見せます。";
  renderBigCards();
}

function initData(){
  rows.forEach(row=>{
    if(!rowLabelData[row.id])rowLabelData[row.id]=row.defaultLabelCardId;
    for(let i=0;i<SLOT_COUNT;i++){
      const key=`${row.id}-${i}`;
      if(!boardData[key])boardData[key]={cardId:null,done:false};
    }
  });
}

function getCard(id){return cardMaster.find(c=>c.id===id)}

function cardHtml(c){
  if(!c)return"";
  return `<div class="card"><img src="${c.image}" alt="${c.label}"><div class="label">${c.label}</div></div>`;
}

function renderBoard(){
  initData();
  const board=document.getElementById("board");
  board.innerHTML="";
  rows.forEach(row=>{
    const rowEl=document.createElement("div");
    rowEl.className="row";

    const labelEl=document.createElement("div");
    labelEl.className="row-label";
    labelEl.onclick=()=>openRowLabelPicker(row.id);
    labelEl.innerHTML=cardHtml(getCard(rowLabelData[row.id]));
    rowEl.appendChild(labelEl);

    for(let i=0;i<SLOT_COUNT;i++){
      const key=`${row.id}-${i}`;
      const slot=document.createElement("div");
      const data=boardData[key]||{cardId:null,done:false};
      slot.className="slot"+(!data.cardId?" empty":"")+(data.done?" done":"");
      slot.dataset.key=key;
      slot.onclick=()=>onSlotClick(key);

      slot.draggable=!!data.cardId&&!doneMode;
      slot.ondragstart=e=>onDragStart(e,key);
      slot.ondragover=e=>onDragOver(e);
      slot.ondragleave=e=>onDragLeave(e);
      slot.ondrop=e=>onDrop(e,key);
      slot.ondragend=e=>onDragEnd(e);

      if(data.cardId)slot.innerHTML=cardHtml(getCard(data.cardId));
      rowEl.appendChild(slot);
    }
    board.appendChild(rowEl);
  });
}

function renderBigCards(){
  const stage=document.getElementById("bigStage");
  if(!stage)return;
  const count=Math.max(bigCards.length,1);
  stage.style.setProperty("--big-count",count);
  stage.innerHTML="";

  if(bigCards.length===0){
    const empty=document.createElement("div");
    empty.className="big-empty";
    empty.textContent="＋";
    empty.onclick=addBigCard;
    stage.appendChild(empty);
    return;
  }

  bigCards.forEach((cardId,index)=>{
    const card=getCard(cardId);
    const el=document.createElement("div");
    el.className="big-card"+(bigCards.length===1?" one":"");
    el.onclick=()=>changeBigCard(index);
    el.innerHTML=`
      <button class="remove-big" onclick="event.stopPropagation(); removeBigCard(${index})">消す</button>
      <img src="${card.image}" alt="${card.label}">
      <div class="big-label">${card.label}</div>
    `;
    stage.appendChild(el);
  });
}

function addBigCard(){
  if(bigCards.length>=3){
    alert("大きく表示できるカードは最大3枚です");
    return;
  }
  selectedBigIndex=null;
  openPicker("大きく見せる絵カードを選んでください","bigAdd");
}

function changeBigCard(index){
  selectedBigIndex=index;
  openPicker("このカードを差し替えます","bigChange");
}

function removeBigCard(index){
  bigCards.splice(index,1);
  autoSave();
  renderBigCards();
}

function clearBigCards(){
  if(!confirm("大きく表示しているカードをすべて消しますか？"))return;
  bigCards=[];
  autoSave();
  renderBigCards();
}

function renderPicker(){
  const picker=document.getElementById("picker");
  picker.innerHTML="";
  cardMaster.forEach(card=>{
    const el=document.createElement("div");
    el.className="pick-card";
    el.innerHTML=`<img src="${card.image}" alt="${card.label}"><span>${card.label}</span>`;
    el.onclick=()=>selectCard(card.id);
    picker.appendChild(el);
  });
}

function openPicker(title,mode){
  pickerMode=mode;
  document.getElementById("pickerTitle").textContent=title;
  document.getElementById("removeButton").style.display=mode==="slot"?"inline-block":"none";
  renderPicker();
  document.getElementById("pickerDialog").showModal();
}

function openRowLabelPicker(rowId){
  selectedRowId=rowId;
  selectedSlotKey=null;
  selectedBigIndex=null;
  openPicker("この行の場面カードを選んでください","rowLabel");
}

function onSlotClick(key){
  if(draggedSlotKey)return;
  selectedSlotKey=key;
  selectedRowId=null;
  selectedBigIndex=null;

  if(doneMode){
    boardData[key].done=!boardData[key].done;
    renderBoard();
    autoSave();
    return;
  }

  openPicker("この枠に入れる絵カードを選んでください","slot");
}

function selectCard(cardId){
  if(pickerMode==="rowLabel"&&selectedRowId){
    rowLabelData[selectedRowId]=cardId;
  }

  if(pickerMode==="slot"&&selectedSlotKey){
    boardData[selectedSlotKey]={cardId,done:false};
  }

  if(pickerMode==="bigAdd"){
    if(bigCards.length<3)bigCards.push(cardId);
  }

  if(pickerMode==="bigChange"&&selectedBigIndex!==null){
    bigCards[selectedBigIndex]=cardId;
  }

  closePicker();
  renderBoard();
  renderBigCards();
  autoSave();
}

function removeCard(){
  if(pickerMode!=="slot"||!selectedSlotKey)return;
  boardData[selectedSlotKey]={cardId:null,done:false};
  closePicker();
  renderBoard();
  autoSave();
}

function closePicker(){
  document.getElementById("pickerDialog").close();
  selectedSlotKey=null;
  selectedRowId=null;
  selectedBigIndex=null;
}

function onDragStart(e,key){
  if(doneMode||!boardData[key].cardId){
    e.preventDefault();
    return;
  }
  draggedSlotKey=key;
  e.dataTransfer.effectAllowed="move";
  e.dataTransfer.setData("text/plain",key);
  setTimeout(()=>{
    const el=document.querySelector(`[data-key="${key}"]`);
    if(el)el.classList.add("dragging");
  },0);
}

function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add("drag-over");
  e.dataTransfer.dropEffect="move";
}

function onDragLeave(e){
  e.currentTarget.classList.remove("drag-over");
}

function onDrop(e,targetKey){
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");

  const sourceKey=e.dataTransfer.getData("text/plain")||draggedSlotKey;
  if(!sourceKey||sourceKey===targetKey)return;

  const sourceData=boardData[sourceKey];
  const targetData=boardData[targetKey];

  boardData[targetKey]=sourceData;
  boardData[sourceKey]=targetData||{cardId:null,done:false};

  draggedSlotKey=null;
  renderBoard();
  autoSave();
}

function onDragEnd(){
  document.querySelectorAll(".slot").forEach(el=>el.classList.remove("dragging","drag-over"));
  draggedSlotKey=null;
}

function toggleDoneMode(){
  doneMode=!doneMode;
  document.getElementById("doneModeText").textContent=doneMode?"ON":"OFF";
  renderBoard();
}

function saveBoard(){
  localStorage.setItem("akariScheduleBoardV4",JSON.stringify({boardData,rowLabelData,bigCards}));
  alert("保存しました");
}

function autoSave(){
  localStorage.setItem("akariScheduleBoardV4",JSON.stringify({boardData,rowLabelData,bigCards}));
}

function loadBoard(){
  const savedV4=localStorage.getItem("akariScheduleBoardV4");
  if(savedV4){
    const p=JSON.parse(savedV4);
    boardData=p.boardData||{};
    rowLabelData=p.rowLabelData||{};
    bigCards=p.bigCards||[];
  }else{
    const savedV3=localStorage.getItem("akariScheduleBoardV3");
    if(savedV3){
      const p=JSON.parse(savedV3);
      boardData=p.boardData||{};
      rowLabelData=p.rowLabelData||{};
    }
  }
  initData();
  renderBoard();
  renderBigCards();
}

function clearBoard(){
  if(!confirm("予定をすべて消しますか？"))return;
  boardData={};
  rowLabelData={};
  initData();
  autoSave();
  renderBoard();
}

async function startApp(){
  await loadCardMaster();
  initData();
  loadBoard();
  renderBoard();
  renderBigCards();
  switchMode("schedule");
}
startApp();
</script>
</body>
</html>
